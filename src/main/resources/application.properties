# Server
server.port=8080

# Spring Data REST
spring.data.rest.base-path=/api
spring.data.rest.detection-strategy=annotated

# Database (MySQL)
# spring.datasource.url=jdbc:mysql://localhost:3306/your_database_name?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# spring.jpa.show-sql=true
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Google GenAI (Configuration)
spring.ai.google.genai.embedding.project-id=dummy
spring.ai.google.genai.embedding.location=us-central1
# spring.ai.google.genai.api-key=YOUR_API_KEY
# spring.ai.google.genai.chat.options.model=gemini-pro

# Exclusions (Remove when Google Credentials are set up)
spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration
