server.port=8080
# H2 Embedded Database Configuration
spring.datasource.url=jdbc:h2:mem:impresora_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# H2 Console (optional - access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
#spring.datasource.hikari.auto-commit=false
#spring.datasource.hikari.maximum-pool-size=5
#spring.datasource.hikari.minimum-idle=0
springdoc.swagger-ui.enabled=true
logging.level.root=WARN
logging.level.ggigeroa.impresora.runner=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.orm.jpa=OFF
logging.level.org.hibernate=OFF
logging.level.org.springframework.boot.autoconfigure=WARN
